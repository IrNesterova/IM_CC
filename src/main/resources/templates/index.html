<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium Maledictum</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #f2f3ed;
            background-image: url("https://img.magnific.com/free-photo/plain-rough-gray-cement-textured-background_53876-128155.jpg?semt=ais_hybrid&w=740&q=80");
            color: #050504;
            font-family: 'EB Garamond', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            border-bottom: 2px solid #085d65;
            padding: 14px 48px;
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        .topbar-game {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #085d65;
        }

        .topbar-divider {
            width: 1px;
            height: 14px;
            background: rgba(8,93,101,0.3);
            align-self: center;
        }

        .topbar-sub {
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            color: rgba(5,5,4,0.45);
            font-style: italic;
        }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
        }

        .center {
            max-width: 580px;
            width: 100%;
        }

        .index-card {
            background: rgba(247,248,242,0.94);
            border: 1px solid rgba(8,93,101,0.18);
            padding: 48px 52px;
            box-shadow: 0 4px 28px rgba(5,5,4,0.1);
        }

        /* ── Logo ── */
        .logo {
            margin-bottom: 40px;
        }

        .logo-line {
            height: 1px;
            background: #085d65;
            margin-bottom: 20px;
        }

        .logo-title {
            font-family: 'Cinzel', serif;
            font-size: 64px;
            line-height: 0.88;
            text-transform: uppercase;
            color: #085d65;
            letter-spacing: -1px;
        }

        .logo-title .small {
            font-size: 34px;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(8,93,101,0.6);
            display: block;
            margin-top: 4px;
        }

        .logo-line-bottom {
            height: 1px;
            background: rgba(8,93,101,0.25);
            margin-top: 20px;
        }

        /* ── Description ── */
        .description {
            font-size: 19px;
            line-height: 1.72;
            color: rgba(5,5,4,0.7);
            margin-bottom: 44px;
        }

        /* ── Buttons ── */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .load-expand {
            display: none;
            gap: 8px;
            align-items: stretch;
        }
        .load-expand.open { display: flex; }
        .load-code-input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: 1px solid rgba(5,5,4,0.3);
            color: #050504;
            font-family: 'Cinzel', serif;
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
        }
        .load-code-input:focus { border-color: #085d65; }
        .load-code-input::placeholder { letter-spacing: 2px; font-size: 12px; color: rgba(5,5,4,0.35); }
        .btn-go {
            padding: 14px 20px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            background: #085d65;
            color: #f2f3ed;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-go:hover { background: #0a7080; }

        .btn {
            display: block;
            width: 100%;
            padding: 17px 28px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: 0.18s ease;
        }

        .btn-primary {
            background: #085d65;
            color: #f2f3ed;
        }

        .btn-primary:hover {
            background: #0a7080;
        }

        .btn-secondary {
            background: transparent;
            color: #050504;
            border: 1px solid rgba(5,5,4,0.3);
        }

        .btn-secondary:hover {
            border-color: #085d65;
            color: #085d65;
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid rgba(5,5,4,0.1);
            padding: 18px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-left {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(5,5,4,0.35);
        }

        .footer-right {
            font-size: 13px;
            color: rgba(5,5,4,0.35);
            font-style: italic;
        }

        @media (max-width: 600px) {
            .topbar { padding: 12px 24px; }
            main { padding: 44px 24px; }
            .logo-title { font-size: 46px; }
            .logo-title .small { font-size: 24px; }
            footer { padding: 16px 24px; flex-direction: column; gap: 6px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <span class="topbar-game">Warhammer 40,000 Roleplay</span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">Character Creator</span>
</div>

<main>
    <div class="center">
        <div class="index-card">

        <div class="logo">
            <div class="logo-line"></div>
            <div class="logo-title">
                Imperium
                <span class="small">Maledictum</span>
            </div>
            <div class="logo-line-bottom"></div>
        </div>

        <p class="description">
            В галактике есть только война. Создай своего аколита —
            агента Инквизиции, ветерана Астра Милитарум или жителя
            гниющего улья — и отправься служить Императору.
        </p>

        <div class="buttons">
            <a href="/characteristics" class="btn btn-primary">Создать персонажа</a>
            <button class="btn btn-secondary" onclick="toggleLoad()" id="load-toggle-btn">Загрузить персонажа</button>
            <div class="load-expand" id="load-expand">
                <input type="text" class="load-code-input" id="load-code-input"
                       placeholder="Введи код" maxlength="6"
                       onkeydown="if(event.key==='Enter') doLoad()">
                <button class="btn-go" onclick="doLoad()">→</button>
            </div>
        </div>

        </div>
    </div>
</main>

<footer>
    <span class="footer-left">Imperium Maledictum</span>
    <span class="footer-right">© Games Workshop Ltd</span>
</footer>

<script>
    function toggleLoad() {
        const exp = document.getElementById('load-expand');
        const open = exp.classList.toggle('open');
        if (open) document.getElementById('load-code-input').focus();
    }
    function doLoad() {
        const code = document.getElementById('load-code-input').value.trim().toUpperCase();
        if (code.length !== 6) { alert('Введи 6-символьный код.'); return; }
        window.location.href = `/character/restore/${code}`;
    }
</script>
</body>
</html>
