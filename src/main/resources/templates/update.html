<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="ISO-8859-1">
    <title>Employee Management System</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Characteristics Management System</h1>
    <hr>
    <h2>Update Characteristics</h2>

    <form action="#" th:action="@{/characteristics/save}" th:object="${characteristics}"
          method="POST">

        <!-- Add hidden form field to handle update -->
        <input type="hidden" th:field="*{id}"/>
        <input type="text" th:field="*{name}" class="form-control mb-4 col-4">
        <input type="text" th:field="*{full_name}" class="form-control mb-4 col-4">
        <textarea rows="4" cols="50" th:field="*{description}"></textarea>
        <button type="submit" class="btn btn-info col-2"> Update Characteristics</button>
    </form>

    <hr>

    <a th:href = "@{/}"> Back to Characteristics List</a>
</div>
</body>
</html>
